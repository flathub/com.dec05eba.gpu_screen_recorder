name: ffmpeg
disabled: false
config-opts:
  - --enable-gpl
  - --enable-version3
  - --enable-shared
  - --disable-static
  - --disable-debug
  - --disable-doc
  - --disable-programs
  - --disable-decoders
  - --disable-indevs
  - --disable-vdpau
  #- --disable-encoders
  - --disable-filters
  - --disable-amf
  - --disable-audiotoolbox
  - --disable-videotoolbox
  - --disable-sdl2
  - --disable-autodetect
  - --disable-avdevice
  - --disable-dwt
  - --disable-lsp
  - --disable-faan
  - --disable-iamf
  - --disable-alsa
  - --disable-iconv
  - --disable-sndio
  - --disable-xlib
  - --disable-cuda-llvm
  - --disable-debug
  - --enable-filter=amix
  - --enable-nvenc
  - --enable-ffnvcodec
  - --enable-libopus
  - --enable-vaapi
  - --enable-vulkan
  - --enable-libx264
  - --enable-openssl
cleanup:
  - /share/ffmpeg/examples
sources:
  - type: git
    url: https://github.com/FFmpeg/FFmpeg.git
    commit: 38b88335f99e76ed89ff3c93f877fdefce736c13
    tag: n8.1.2
    x-checker-data:
      type: git
      tag-pattern: ^n([\d.]+)$
      versions:
        <: '9'
  # Runtime NVENC API version negotiation: built against nv-codec-headers 13.0
  # (for AV1 and RTX 5000 series support) but still works on drivers down to
  # 470.57.02 (nvenc API 11.1, the last driver branch for the first NVENC
  # generation, Kepler) by presenting the older API's struct versions at
  # runtime and disabling features the driver doesn't support.
  # The patch is written against ffmpeg n8.1 and pins nv-codec-headers to
  # 13.0.x (its struct version table and legacy 10-bit field layout were
  # validated for exactly that combination; it fails the build otherwise).
  - type: patch
    path: ffmpeg-nvenc-runtime-api-version.patch
modules:
  - name: ffnvcodec
    no-autogen: true
    make-install-args:
      - PREFIX=${FLATPAK_DEST}
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://github.com/FFmpeg/nv-codec-headers.git
        commit: 88fee5c37318c991a8762d423530f91681e32e3a
        tag: n13.0.19.1
        x-checker-data:
          type: git
          tag-pattern: ^n([\d.]+)$
          versions:
            # The nvenc runtime API negotiation patch is validated against
            # 13.0.x headers only; bumping past that requires re-validating
            # the patch (it will fail the build on purpose).
            <: '13.1'
  - name: libx264
    config-opts:
      - --disable-cli
      - --enable-shared
      - --disable-opencl
      - --disable-bashcompletion
      - --enable-strip
    no-autogen: true
    make-install-args:
      - PREFIX=${FLATPAK_DEST}
   # cleanup:
  #    - '*'
    sources:
      - type: git
        url: https://code.videolan.org/videolan/x264.git
        commit: b35605ace3ddf7c1a5d67a2eb553f034aef41d55
